<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="head-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00F5FF"/>
      <stop offset="50%" stop-color="#9945FF"/>
      <stop offset="100%" stop-color="#FF00E1"/>
    </linearGradient>
    <filter id="neon-glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Body -->
  <ellipse cx="200" cy="280" rx="90" ry="70" fill="url(#head-grad)" opacity="0.8" filter="url(#neon-glow)"/>
  <!-- Left head -->
  <g transform="translate(140, 160)">
    <ellipse cx="0" cy="0" rx="55" ry="65" fill="url(#head-grad)" filter="url(#neon-glow)"/>
    <polygon points="-30,-60 -10,-40 -20,-20" fill="url(#head-grad)"/>
    <polygon points="30,-60 10,-40 20,-20" fill="url(#head-grad)"/>
    <circle cx="-18" cy="-5" r="6" fill="#fff"/>
    <circle cx="18" cy="-5" r="6" fill="#fff"/>
    <circle cx="-18" cy="-5" r="3" fill="#00F5FF"/>
    <circle cx="18" cy="-5" r="3" fill="#FF00E1"/>
  </g>
  <!-- Right head -->
  <g transform="translate(260, 160)">
    <ellipse cx="0" cy="0" rx="55" ry="65" fill="url(#head-grad)" filter="url(#neon-glow)"/>
    <polygon points="-30,-60 -10,-40 -20,-20" fill="url(#head-grad)"/>
    <polygon points="30,-60 10,-40 20,-20" fill="url(#head-grad)"/>
    <circle cx="-18" cy="-5" r="6" fill="#fff"/>
    <circle cx="18" cy="-5" r="6" fill="#fff"/>
    <circle cx="-18" cy="-5" r="3" fill="#FF00E1"/>
    <circle cx="18" cy="-5" r="3" fill="#00F5FF"/>
  </g>
  <!-- Legs -->
  <rect x="160" y="330" width="18" height="60" rx="9" fill="url(#head-grad)"/>
  <rect x="222" y="330" width="18" height="60" rx="9" fill="url(#head-grad)"/>
  <!-- Tail -->
  <path d="M 290 280 Q 340 250 330 200 Q 325 190 335 195" fill="none" stroke="url(#head-grad)" stroke-width="12" stroke-linecap="round" filter="url(#neon-glow)"/>
</svg>
